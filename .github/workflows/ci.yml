name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16.13-alpine
        env:
          POSTGRES_DB: dailyenglish_test
          POSTGRES_USER: dailyenglish
          POSTGRES_PASSWORD: integration-password-123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dailyenglish -d dailyenglish_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://dailyenglish:integration-password-123@localhost:5432/dailyenglish_test
      TEST_DATABASE_URL: postgresql+asyncpg://dailyenglish:integration-password-123@localhost:5432/dailyenglish_test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install locked dependencies
        run: python -m pip install --constraint requirements.lock -e ".[dev]"
      - name: Lint and format check
        run: |
          ruff check app migrations tests
          ruff format --check app migrations tests
      - name: Validate migrations
        run: alembic upgrade head
      - name: Run tests
        run: pytest
      - name: Validate Compose configuration
        run: |
          cp .env.example .env
          sed -i 's/^POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=compose-password-123/' .env
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql+asyncpg://dailyenglish:compose-password-123@postgres:5432/dailyenglish|' .env
          docker compose config --quiet
      - name: Build runtime image
        run: docker build --target runtime --tag dailyenglish:test .
