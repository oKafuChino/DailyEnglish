services:
  postgres:
    image: postgres:16.13-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dailyenglish}
      POSTGRES_USER: ${POSTGRES_USER:-dailyenglish}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    shm_size: 128mb
    stop_grace_period: 30s
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: runtime
    image: dailyenglish:${DAILYENGLISH_IMAGE_TAG:-latest}
    command: ["alembic", "upgrade", "head"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging
    restart: "no"

  bot:
    image: dailyenglish:${DAILYENGLISH_IMAGE_TAG:-latest}
    command: ["python", "-m", "app.main"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck: &app-healthcheck
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging
    stop_grace_period: 30s
    restart: unless-stopped

  worker:
    image: dailyenglish:${DAILYENGLISH_IMAGE_TAG:-latest}
    command: ["python", "-m", "app.workers.main"]
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck: *app-healthcheck
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging: *default-logging
    stop_grace_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-dailyenglish_postgres_data}
